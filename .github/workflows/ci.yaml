name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: bcmath, curl, dom, gd, intl, mbstring, pdo_pgsql, zip
          tools: composer:v2

      - uses: pnpm/action-setup@v4
        with:
          version: 10.17.1

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: composer validate --strict
      - run: composer install --no-interaction --prefer-dist
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: find config -name '*.php' -print0 | xargs -0 -n1 php -l

