name: craft-cms-2026
type: craftcms
docroot: web
php_version: "8.4"
webserver_type: nginx-fpm
database:
  type: postgres
  version: "16"
nodejs_version: "22"
composer_version: "2"
upload_dirs:
  - web/uploads
web_environment:
  - CRAFT_APP_ID=craft-cms-2026
  - CRAFT_ENVIRONMENT=dev
  - CRAFT_DB_DRIVER=pgsql
  - CRAFT_DB_SERVER=db
  - CRAFT_DB_PORT=5432
  - CRAFT_DB_DATABASE=db
  - CRAFT_DB_USER=db
  - CRAFT_DB_PASSWORD=db
  - PRIMARY_SITE_URL=https://craft-cms-2026.ddev.site
